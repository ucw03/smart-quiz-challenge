<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Challenge</title>

<link rel="stylesheet" href="quiz.css">
    <link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="quiz-container">

    <h2 id="categoryTitle"></h2>

    <div class="progress-bar">
        <div id="progress"></div>
    </div>

    <h3 id="questionNumber">Question 1 / 10</h3>

    <h3>
        ⏳ Time Left:
        <span id="timer">3 sec</span>s
    </h3>

    <h2 id="question"></h2>

    <div class="options">
        <button class="option-btn" id="a" onclick="selectAnswer(0)"></button>

        <button class="option-btn" id="b" onclick="selectAnswer(1)"></button>

        <button class="option-btn" id="c" onclick="selectAnswer(2)"></button>

        <button class="option-btn" id="d" onclick="selectAnswer(3)"></button>
    </div>

    <button id="nextBtn"
            onclick="nextQuestion()"
            style="display:none;">
        Next Question →
    </button>

</div>


<script src="quiz.js"></script>

</body>
</html>
